server {
        listen 80 default_server;
        listen [::]:80 default_server;
        
        root  /app/dist;
        index index.html index.htm;
        server_name _;

        location / {
                try_files $uri $uri/ /index.html;
        }

        location /assets/ {
                expires 1y;
                add_header Cache-Control "public, no-transform";
                access_log off;
        }
}